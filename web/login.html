<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Court Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="card p-4 mx-auto" style="max-width: 400px;">
    <h3 class="text-center mb-4">⚖️ Court Management Login</h3>

    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" id="username" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" required>
    </div>

    <button class="btn btn-primary w-100" onclick="login()">Login</button>

    <div id="error" class="text-danger mt-3"></div>
  </div>
</div>

<script>
async function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorDiv = document.getElementById("error");

  if (!username || !password) {
    errorDiv.textContent = "Please enter both username and password.";
    return;
  }

  try {
    const res = await fetch("login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (res.ok && data.role) {
      switch (data.role) {
        case "admin": window.location.href = "admin-dashboard.html"; break;
        case "judge": window.location.href = "judge-dashboard.html"; break;
        case "lawyer": window.location.href = "lawyer-dashboard.html"; break;
        case "client": window.location.href = "client-dashboard.html"; break;
      }
    } else {
      errorDiv.textContent = data.message || "Invalid credentials.";
    }
  } catch (err) {
    console.error(err);
    errorDiv.textContent = "Server error. Please try again.";
  }
}
</script>
</body>
</html>
